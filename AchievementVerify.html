<!DOCTYPE html>
<html lang="ko">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>업적 검증 도우미</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:linear-gradient(160deg,#2c1a4d 0%,#4a2d7a 100%); color:#2c3e50; min-height:100vh; }
  .wrap { max-width:760px; margin:0 auto; padding:16px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; color:#fff; padding:10px 4px 18px; }
  .topbar h1 { font-size:20px; margin:0; letter-spacing:-0.5px; }
  .topbar h1 small { display:block; font-size:12px; opacity:.8; font-weight:400; margin-top:3px; }
  .who { font-size:13px; background:rgba(255,255,255,.15); padding:6px 12px; border-radius:20px; white-space:nowrap; }
  .login { background:#fff; border-radius:18px; padding:28px 22px; box-shadow:0 12px 40px rgba(0,0,0,.25); margin-top:8vh; }
  .login .emoji { font-size:44px; text-align:center; }
  .login h2 { text-align:center; margin:8px 0 4px; color:#4a2d7a; font-size:22px; }
  .login p { text-align:center; color:#888; font-size:13px; margin:0 0 20px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; font-weight:700; color:#555; margin-bottom:6px; }
  .field input { width:100%; padding:13px 14px; border:2px solid #e3e0ee; border-radius:12px; font-size:16px; outline:none; }
  .field input:focus { border-color:#8e44ad; }
  .btn { width:100%; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; transition:transform .08s,filter .15s; }
  .btn:active { transform:scale(.98); }
  .btn-main { background:linear-gradient(135deg,#8e44ad,#6c3fb5); color:#fff; }
  .err { color:#e74c3c; font-size:13px; text-align:center; min-height:18px; margin-top:6px; }
  .toolbar { display:flex; gap:8px; margin-bottom:10px; }
  .toolbar .btn { width:auto; flex:1; padding:11px; font-size:14px; }
  .btn-ghost { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); }
  .summary { color:#e9e2ff; font-size:13px; margin:0 4px 12px; }
  .filterbar { display:flex; gap:6px; margin:0 0 12px; flex-wrap:wrap; }
  .chip { font-size:12px; font-weight:700; padding:7px 13px; border-radius:18px; cursor:pointer; border:1px solid rgba(255,255,255,.3); color:#e9e2ff; background:rgba(255,255,255,.08); }
  .chip.active { background:#fff; color:#4a2d7a; border-color:#fff; }
  .card { background:#fff; border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 6px 20px rgba(0,0,0,.18); }
  .card.done-approve { border:2px solid #27ae60; }
  .card.done-reject  { border:2px solid #e74c3c; }
  .c-head { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .c-name { font-size:17px; font-weight:800; color:#2c3e50; }
  .c-time { font-size:11px; color:#aaa; white-space:nowrap; }
  .judge { display:inline-block; font-size:11px; font-weight:800; border-radius:6px; padding:2px 9px; margin-bottom:8px; }
  .judge.j가능 { background:#e8f8ef; color:#1e8449; }
  .judge.j불가 { background:#f0f0f0; color:#888; }
  .judge.j자동 { background:#eaf2fb; color:#2471a3; }
  .c-ach { margin:4px 0 10px; padding:10px 12px; border-radius:10px; background:#f6f2fb; border-left:4px solid #8e44ad; }
  .c-ach .id { font-size:12px; color:#8e44ad; font-weight:800; }
  .c-ach .nm { font-size:15px; font-weight:800; color:#4a2d7a; margin:2px 0; }
  .c-ach .cond { font-size:13px; color:#555; }
  .c-proof-label { font-size:11px; color:#999; font-weight:700; margin:12px 0 4px; }
  .c-proof { font-size:14px; color:#333; background:#fafafa; border:1px dashed #ddd; border-radius:8px; padding:10px; white-space:pre-wrap; word-break:break-word; }
  .evi-label { font-size:11px; color:#999; font-weight:700; margin:14px 0 6px; }
  .evi { border:1px solid #eee; border-radius:10px; overflow:hidden; }
  .evi-row { display:flex; justify-content:space-between; align-items:center; padding:9px 12px; font-size:14px; border-bottom:1px solid #f2f2f2; }
  .evi-row:last-child { border-bottom:none; }
  .evi-row .lab { color:#555; }
  .evi-row .val { font-weight:800; color:#2c3e50; }
  .evi-row.ok { background:#f3fbf6; }
  .evi-row.bad { background:#fdf3f2; }
  .evi-row .mark { margin-left:8px; font-weight:800; }
  .evi-row.ok .mark { color:#27ae60; }
  .evi-row.bad .mark { color:#e74c3c; }
  .evi-note { font-size:12px; color:#e67e22; background:#fff8f0; padding:8px 12px; border-top:1px solid #f2e6d6; }
  .more-btn { font-size:12px; color:#8e44ad; background:none; border:none; cursor:pointer; padding:6px 0; font-weight:700; }
  .core { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; margin-top:6px; }
  .core .b { background:#f4f7fb; border-radius:8px; padding:7px 10px; display:flex; justify-content:space-between; font-size:12px; }
  .core .b .v { font-weight:800; color:#2c3e50; }
  .rec-memo { width:100%; margin-top:14px; padding:10px 12px; border:2px solid #e3e0ee; border-radius:10px; font-size:14px; outline:none; resize:vertical; min-height:42px; }
  .rec-memo:focus { border-color:#8e44ad; }
  .rec-btns { display:flex; gap:8px; margin-top:10px; }
  .rec-btns .btn { font-size:15px; padding:12px; }
  .b-approve { background:#27ae60; color:#fff; }
  .b-reject { background:#e74c3c; color:#fff; }
  .b-approve.dim,.b-reject.dim { filter:grayscale(.6); opacity:.45; }
  .b-clear { background:#ecf0f1; color:#7f8c8d; flex:0 0 auto; width:auto; padding:12px 14px; }
  .rec-status { margin-top:10px; font-size:13px; font-weight:700; text-align:center; padding:8px; border-radius:8px; }
  .rec-status.approve { background:#e8f8ef; color:#1e8449; }
  .rec-status.reject { background:#fdecea; color:#c0392b; }
  .empty { color:#e9e2ff; text-align:center; padding:40px 10px; font-size:15px; }
  .hidden { display:none; }
  .toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:#2c3e50; color:#fff; padding:11px 20px; border-radius:24px; font-size:14px; font-weight:700; opacity:0; transition:all .25s; pointer-events:none; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.3); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <div id="loginView">
    <div class="login">
      <div class="emoji">🔎</div>
      <h2>업적 검증 도우미</h2>
      <p>업적검증도우미만 들어올 수 있어요</p>
      <div class="field"><label>이름</label><input id="inName" type="text" placeholder="내 이름" autocomplete="off"></div>
      <div class="field"><label>비밀번호</label><input id="inPw" type="password" placeholder="비밀번호" autocomplete="off"></div>
      <button class="btn btn-main" onclick="doLogin()">들어가기</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>
  <div id="mainView" class="hidden">
    <div class="topbar">
      <h1>🔎 업적 검증<small>승인/반려를 추천하면 선생님이 최종 확정해요</small></h1>
      <div class="who" id="whoBadge"></div>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost" onclick="loadList()">🔄 새로고침</button>
      <button class="btn btn-ghost" onclick="logout()">로그아웃</button>
    </div>
    <div class="filterbar">
      <span class="chip active" data-f="all" onclick="setFilter('all',this)">전체</span>
      <span class="chip" data-f="todo" onclick="setFilter('todo',this)">미추천</span>
      <span class="chip" data-f="mine" onclick="setFilter('mine',this)">내 담당(가능)</span>
    </div>
    <div class="summary" id="summary"></div>
    <div id="cardList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  var SESSION = { name:'', pw:'' };
  var CACHE = [];
  var TOTAL_STUDENTS = 23;
  var FILTER = 'all';

  function doLogin(){
    var name=document.getElementById('inName').value.trim();
    var pw=document.getElementById('inPw').value;
    var err=document.getElementById('loginErr'); err.textContent='';
    if(!name){ err.textContent='이름을 입력해 주세요.'; return; }
    google.script.run
      .withSuccessHandler(function(res){
        if(!res.success){ err.textContent=res.msg||'로그인 실패'; return; }
        SESSION.name=res.helperName||name; SESSION.pw=pw;
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
        document.getElementById('whoBadge').textContent='👋 '+SESSION.name;
        loadList();
      })
      .withFailureHandler(function(e){ err.textContent='오류: '+e.message; })
      .verifyHelperLogin(name, pw);
  }
  function logout(){ SESSION={name:'',pw:''}; CACHE=[]; document.getElementById('inPw').value='';
    document.getElementById('mainView').classList.add('hidden');
    document.getElementById('loginView').classList.remove('hidden'); }

  function setFilter(f, el){ FILTER=f;
    document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
    el.classList.add('active'); render(); }

  function loadList(){
    var list=document.getElementById('cardList');
    list.innerHTML='<div class="empty">불러오는 중…</div>';
    google.script.run
      .withSuccessHandler(function(res){
        if(!res.success){ if(res.msg&&res.msg.indexOf('도우미')!==-1) logout();
          list.innerHTML='<div class="empty">'+(res.msg||'불러오기 실패')+'</div>'; return; }
        CACHE=res.pending||[]; TOTAL_STUDENTS=res.totalStudents||23; render();
      })
      .withFailureHandler(function(e){ list.innerHTML='<div class="empty">오류: '+e.message+'</div>'; })
      .getPendingForHelper(SESSION.name, SESSION.pw);
  }

  function fmt(n){ return (Number(n)||0).toLocaleString('ko-KR'); }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function L(lab,val,ok){ return {lab:lab,val:val,ok:(ok===undefined?null:ok)}; }
  var RULES = {
    'ECO-003': function(s){ return { lines:[L('MVP포인트', fmt(s.mvp), s.mvp>=5000), L('히스토리 [MVP] 누적', fmt(s.mvpFromHistory))], note:'MVP 포인트만으로 5000 이상인지 확인' }; },
    'ECO-004': function(s){ return { lines:[L('누적 기부액', fmt(s.donationTotal), s.donationTotal>=10000)] }; },
    'ECO-006': function(s){ return { lines:[L('최근 14일 간식 구매', s.snackCount14+'건', s.snackCount14===0), L('마지막 간식 구매일', s.snackLastDate||'없음')], note:'2주간 간식 0건이어야 함' }; },
    'ECO-008': function(s){ return { lines:[L('최근 7일 소비 합계', fmt(s.spend7), s.spend7<=1000)], note:'기부·세금 포함된 자산사용 총합 기준' }; },
    'ECO-009': function(s){ return { lines:[L('하루 최대 획득 경로 수', s.maxPathsOneDay+'종', s.maxPathsOneDay>=3)], note:'MVP·일일퀘스트·업적·기부보상 등 서로 다른 경로 3종 이상' }; },
    'ECO-010': function(s){ return { lines:[L('신용점수 최고', fmt(s.creditMax), s.creditMax>=900), L('신용점수 최신', fmt(s.creditLatest))] }; },
    'ECO-011': function(s){ return { lines:[L('하루 최대 기부액', fmt(s.donationMaxDay), s.donationMaxDay>=3000)] }; },
    'ECO-012': function(s){ return { lines:[L('단일 거래 최대 지출(P2P 송금)', fmt(s.p2pMaxSpend), s.p2pMaxSpend>=5000)], note:'경매·상점 단일지출은 별도 확인 필요' }; },
    'ECO-013': function(s){ return { lines:[L('만기 이자수익', s.hasMaturedInterest?'있음':'없음', s.hasMaturedInterest), L('누적 이자', fmt(s.interestTotal))] }; },
    'ECO-014': function(s){ return { lines:[L('누적 이자수익', fmt(s.interestTotal), s.interestTotal>=2000)] }; },
    'ECO-015': function(s){ return { lines:[L('단일 예금 최대 이자', fmt(s.interestMaxOne), s.interestMaxOne>=5000)] }; },
    'ECO-016': function(s){ return { lines:[L('한 경매 최대 낙찰 수', s.auctionWinMaxDay+'건', s.auctionWinMaxDay>=5), L('총 낙찰 수', s.auctionWinTotal+'건')] }; },
    'ECO-017': function(s){ return { lines:[L('한 경매 최대 낙찰 수', s.auctionWinMaxDay+'건', s.auctionWinMaxDay>=15), L('총 낙찰 수', s.auctionWinTotal+'건')] }; },
    'ECO-020': function(s){ return { lines:[L('판매자 평균 평점', s.sellerRateAvg||'-'), L('평점 받은 거래 수', s.sellerRateCnt+'건')], note:'"같은 친구 3회 이상 구매"는 거래 상대를 직접 확인하세요' }; },
    'ECO-021': function(s){ return { lines:[L('P2P 총 거래 수', (s.p2pSent+s.p2pRecv)+'건', (s.p2pSent+s.p2pRecv)>=1)] }; },
    'ECO-022': function(s){ return { lines:[L('200pt 이상 거래 수', s.p2pOver200+'건', s.p2pOver200>=5)] }; },
    'ECO-024': function(s){ return { lines:[L('자산보유량', fmt(s.asset), s.asset>=30000), L('대출 보유', s.hasActiveLoan?'있음(불가)':'없음', !s.hasActiveLoan)] }; },
    'ECO-029': function(s){ return { lines:[L('순자산', fmt(s.netWorth), s.netWorth>=45000), L('대출 보유', s.hasActiveLoan?'있음(불가)':'없음', !s.hasActiveLoan)], note:'순자산=자산+진행중예금−대출잔액' }; },
    'ECO-030': function(s){ return { lines:[L('순자산', fmt(s.netWorth), s.netWorth>=80000), L('대출 보유', s.hasActiveLoan?'있음(불가)':'없음', !s.hasActiveLoan)] }; },
    'ECO-031': function(s){ return { lines:[L('판매자 평점 거래 수', s.sellerRateCnt+'건', s.sellerRateCnt>=10), L('판매자 평균 평점', s.sellerRateAvg||'-', s.sellerRateAvg>=9.5)] }; },
    'ECO-032': function(s){ return { lines:[L('상점+물품거래소 누적 구매', fmt(s.shopMarketTotal), s.shopMarketTotal>=10000)] }; },
    'ECO-033': function(s){ return { lines:[L('누적 납세액', fmt(s.tax), s.tax>=5000)] }; },
    'ECO-034': function(s){ return { lines:[L('상점/거래소 마지막 이용일', s.shopMarketLastDate||'없음')], note:'최근 한 달간 이용 기록이 없어야 함' }; },
    'ECO-036': function(s){ return { lines:[L('이번 달 판매액(받은 P2P)', fmt(s.monthP2PSell), s.monthP2PSell>=1000)], note:'"가장 많이 판매"인지는 다른 학생과 비교 필요(선생님 확정)' }; },
    'ECO-037': function(s){ return { lines:[L('이번 달 구매액(보낸 P2P)', fmt(s.monthP2PBuy), s.monthP2PBuy>=1000)], note:'"가장 많이 구매"인지는 비교 필요(선생님 확정)' }; },
    'LIFE-021': function(s){ return { lines:[L('거래한 친구 수', s.p2pPartners+'명', s.p2pPartners>=(TOTAL_STUDENTS-1)), L('우리 반 학생 수', TOTAL_STUDENTS+'명')], note:'본인 제외 전원과 거래해야 함' }; },
    'GUILD-003': function(s){ return { lines:[L('P2P 거래한 친구 수', s.p2pPartners+'명'), L('총 P2P 거래', (s.p2pSent+s.p2pRecv)+'건')], note:'M04 기간·타 길드원 여부는 직접 확인' }; }
  };

  function evidenceFor(p){ var fn=RULES[p.achId]; return fn?fn(p.stats):null; }

  function render(){
    var list=document.getElementById('cardList'), sum=document.getElementById('summary');
    var arr=CACHE.filter(function(p){
      if(FILTER==='todo') return !p.myRec;
      if(FILTER==='mine') return p.judge==='가능';
      return true;
    });
    var todo=CACHE.filter(function(p){return !p.myRec;}).length;
    var mine=CACHE.filter(function(p){return p.judge==='가능';}).length;
    sum.textContent='총 '+CACHE.length+'건 · 미추천 '+todo+'건 · 내 담당(가능) '+mine+'건';
    if(!arr.length){ list.innerHTML='<div class="empty">🎉 표시할 신청이 없어요!</div>'; return; }
    list.innerHTML=arr.map(cardHTML).join('');
  }

  function cardHTML(p){
    var s=p.stats||{};
    var judge=p.judge||'';
    var judgeBadge = judge ? '<span class="judge j'+judge+'">'+(judge==='가능'?'🟢 내가 판단':judge==='불가'?'⚪ 선생님 담당':'🔵 자동 부여')+'</span>' : '';
    var eviHTML='';
    var ev=evidenceFor(p);
    if(ev){
      var rows=ev.lines.map(function(l){
        var cls=l.ok===true?'ok':l.ok===false?'bad':'';
        var mark=l.ok===true?'✅':l.ok===false?'✗':'';
        return '<div class="evi-row '+cls+'"><span class="lab">'+esc(l.lab)+'</span>'
             +'<span class="val">'+esc(l.val)+(mark?' <span class="mark">'+mark+'</span>':'')+'</span></div>';
      }).join('');
      eviHTML='<div class="evi-label">📊 검증 근거 (자동 집계)</div><div class="evi">'+rows
            +(ev.note?'<div class="evi-note">💡 '+esc(ev.note)+'</div>':'')+'</div>';
    } else if(judge==='가능'){
      eviHTML='<div class="evi-label">📋 직접 확인이 필요한 업적</div>'
            +'<div class="evi"><div class="evi-note">신청 학생에게 직접 확인하거나 증거를 보고 판단하세요. 아래 기본 정보도 참고할 수 있어요.</div></div>';
    }
    var coreHTML='<button class="more-btn" onclick="var c=this.nextElementSibling;c.style.display=c.style.display===\'grid\'?\'none\':\'grid\';">▾ 기본 정보 더보기</button>'
      +'<div class="core" style="display:none;">'
      +coreBox('자산',fmt(s.asset))+coreBox('브랜드가치',fmt(s.honor))
      +coreBox('순자산',fmt(s.netWorth))+coreBox('MVP',fmt(s.mvp))
      +coreBox('누적납세',fmt(s.tax))+coreBox('누적기부',fmt(s.donationTotal))
      +coreBox('P2P 송금/수령',s.p2pSent+'/'+s.p2pRecv)+coreBox('달성업적',s.achCount+'개')
      +'</div>';
    var cardClass='card'+(p.myRec==='승인추천'?' done-approve':p.myRec==='반려추천'?' done-reject':'');
    var statusHTML = p.myRec==='승인추천'
      ? '<div class="rec-status approve">✅ 승인 추천함'+(p.myMemo?' · '+esc(p.myMemo):'')+'</div>'
      : p.myRec==='반려추천'
      ? '<div class="rec-status reject">❌ 반려 추천함'+(p.myMemo?' · '+esc(p.myMemo):'')+'</div>' : '';
    return '<div class="'+cardClass+'" id="card_'+p.rowNumber+'">'
      +'<div class="c-head"><div class="c-name">'+esc(p.studentName)+'</div><div class="c-time">'+esc(p.timestamp)+'</div></div>'
      +judgeBadge
      +'<div class="c-ach"><div class="id">'+esc(p.achId)+'</div><div class="nm">'+esc(p.achName)+'</div>'
        +'<div class="cond">📌 '+esc(p.condition||'-')+'</div></div>'
      +'<div class="c-proof-label">✍️ 학생이 적은 증거</div>'
      +'<div class="c-proof">'+esc(p.proof||'(증거 없음)')+'</div>'
      +eviHTML+coreHTML
      +'<textarea class="rec-memo" id="memo_'+p.rowNumber+'" placeholder="메모 (선택)">'+esc(p.myMemo)+'</textarea>'
      +'<div class="rec-btns">'
        +'<button class="btn b-approve'+(p.myRec==='반려추천'?' dim':'')+'" onclick="recommend('+p.rowNumber+',\'승인추천\')">✅ 승인 추천</button>'
        +'<button class="btn b-reject'+(p.myRec==='승인추천'?' dim':'')+'" onclick="recommend('+p.rowNumber+',\'반려추천\')">❌ 반려 추천</button>'
        +(p.myRec?'<button class="btn b-clear" onclick="recommend('+p.rowNumber+',\'\')">취소</button>':'')
      +'</div>'+statusHTML+'</div>';
  }
  function coreBox(k,v){ return '<div class="b"><span>'+k+'</span><span class="v">'+v+'</span></div>'; }

  function recommend(rowNumber, rec){
    var memoEl=document.getElementById('memo_'+rowNumber);
    var memo=memoEl?memoEl.value.trim():'';
    google.script.run
      .withSuccessHandler(function(res){
        if(!res.success){ toast(res.msg||'실패'); if(res.msg&&res.msg.indexOf('새로고침')!==-1) loadList(); return; }
        for(var i=0;i<CACHE.length;i++){ if(CACHE[i].rowNumber===rowNumber){ CACHE[i].myRec=res.myRec; CACHE[i].myMemo=res.myMemo; CACHE[i].recBy=res.recBy; break; } }
        var old=document.getElementById('card_'+rowNumber);
        if(old){ var tmp=document.createElement('div'); tmp.innerHTML=cardHTML(CACHE.find(function(p){return p.rowNumber===rowNumber;})); old.replaceWith(tmp.firstChild); }
        var todo=CACHE.filter(function(p){return !p.myRec;}).length;
        var mine=CACHE.filter(function(p){return p.judge==='가능';}).length;
        document.getElementById('summary').textContent='총 '+CACHE.length+'건 · 미추천 '+todo+'건 · 내 담당(가능) '+mine+'건';
        toast(res.msg);
      })
      .withFailureHandler(function(e){ toast('오류: '+e.message); })
      .helperRecommendAchievement(SESSION.name, SESSION.pw, rowNumber, rec, memo);
  }

  var toastTimer=null;
  function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.classList.remove('show'); },1800); }
  document.getElementById('inPw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
