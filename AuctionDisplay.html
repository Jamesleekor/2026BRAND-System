<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>우리 반 라이브 경매</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    .container {
      width: 95%;
      max-width: 1400px;
      padding: 40px;
      background: #1a1a2e;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(61, 133, 200, 0.5);
      position: relative;
    }

    /* ── 대기 / 진행 중 화면 ── */
    .idle-text    { font-size: 50px; color: #7f8c8d; animation: pulse 2s infinite; }
    .item-title   { font-size: 80px; color: #f1c40f; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(241,196,15,0.3); }
    .bidding-text { font-size: 60px; color: #ecf0f1; margin-top: 20px; }
    .start-price  { font-size: 50px; color: #2ecc71; margin-bottom: 10px; border: 3px solid #2ecc71; padding: 10px 30px; border-radius: 50px; display: inline-block; background: rgba(46,204,113,0.1); }

    /* ✅ 타이머 스타일 추가 ──────────────────────────────────── */
    .timer-display {
      font-size: 80px;
      color: #e74c3c;
      font-weight: 900;
      margin-top: 30px;
      padding: 20px 40px;
      border: 5px solid #e74c3c;
      border-radius: 20px;
      display: inline-block;
      background: rgba(231, 76, 60, 0.1);
      box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
      animation: timerPulse 1s ease-in-out infinite;
    }
    .timer-display.warning {
      animation: timerWarning 0.5s ease-in-out infinite;
      border-color: #ff0000;
      color: #ff0000;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
    }
    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes timerWarning {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    /* ──────────────────────────────────────────────────────── */

    .discount-badge { display: inline-block; background: #e74c3c; color: white; font-size: 40px; padding: 10px 30px; border-radius: 50px; margin-bottom: 20px; transform: rotate(-5deg); }

    .discount-badge { display: inline-block; background: #e74c3c; color: white; font-size: 40px; padding: 10px 30px; border-radius: 50px; margin-bottom: 20px; transform: rotate(-5deg); }
    .warning-box    { border: 5px solid #e74c3c; background: rgba(231,76,60,0.2); padding: 20px; border-radius: 15px; margin-top: 20px; }
    .warning-text   { font-size: 45px; color: #ff6b6b; font-weight: 900; }

    /* ── 낙찰 애니메이션 ── */
    .sold-title  { font-size: 100px; color: #2ecc71; text-shadow: 0 0 20px rgba(46,204,113,0.8); margin-bottom: 10px; }
    .sold-winner { font-size: 80px; color: #fff; }
    .sold-price  { font-size: 70px; color: #f39c12; margin-top: 20px; }
    .countdown   { font-size: 250px; color: #e74c3c; font-weight: 900; }

    /* ── 경매 종료 결과: 전체 학생 컴팩트 그리드 ── */
    .results-header {
      font-size: 50px;
      color: #2ecc71;
      margin-bottom: 8px;
      font-weight: 900;
    }
    .results-subtitle {
      font-size: 22px;
      color: #7f8c8d;
      margin-bottom: 24px;
    }
    .results-grid {
      display: grid;
      /* 화면 너비에 따라 자동으로 컬럼 수 조절 (최소 160px씩) */
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      text-align: left;
    }
    .result-card {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 12px 14px;
      transition: transform 0.2s;
    }
    /* 낙찰 있는 학생: 초록 상단 테두리 */
    .result-card.has-items {
      border-top: 4px solid #2ecc71;
      background: rgba(46, 204, 113, 0.1);
    }
    /* 낙찰 없는 학생: 회색 상단 테두리 */
    .result-card.no-items {
      border-top: 4px solid #555;
      opacity: 0.55;
    }
    .result-name {
      font-size: 18px;
      font-weight: bold;
      color: #f1c40f;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-items {
      font-size: 14px;
      color: #ecf0f1;
      line-height: 1.6;
      word-break: keep-all;
    }
    .no-item-text {
      font-size: 14px;
      color: #666;
      font-style: italic;
    }

    @keyframes pulse  { 0%{opacity:0.6;} 50%{opacity:1;} 100%{opacity:0.6;} }
    @keyframes popIn  { 0%{transform:scale(0.5);opacity:0;} 80%{transform:scale(1.1);opacity:1;} 100%{transform:scale(1);opacity:1;} }
  </style>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAspOwJq6u54YBDWIx_WVOjhQHCupmriNc",
      authDomain: "brand-503cd.firebaseapp.com",
      databaseURL: "https://brand-503cd-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "brand-503cd",
      storageBucket: "brand-503cd.firebasestorage.app",
      messagingSenderId: "443808653648",
      appId: "1:443808653648:web:56081109d74a2f32298c55"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // Firebase 리스닝 시작 — 상태 변경 즉시 콜백 실행
    onValue(ref(db, 'auction'), function(snapshot) {
      var stateObj = snapshot.val();
      if (stateObj && window._onFirebaseState) {
        window._onFirebaseState(stateObj);
      }
    });
  </script>
</head>

</head>
<body>

<div class="container" id="mainContainer">
  <div class="idle-text">다음 경매 상품을 기다리는 중입니다...</div>
</div>

<script>
  let currentState = 'idle';
  let isAnimating  = false;
  let timerInterval = null;
  let endTime = null;

  // ── 효과음 ──────────────────────────────────────────────────────
  const tickingSound = new Audio('https://raw.githubusercontent.com/Jamesleekor/brand-assets/main/sound/dragon-studio-slow-cinematic-clock-ticking-405471.mp3');
  tickingSound.loop = true;
  const soldSound   = new Audio('https://raw.githubusercontent.com/Jamesleekor/brand-assets/main/sound/freesound_crunchpixstudio-purchase-success-384963.mp3');

  function playTicking() {
    tickingSound.currentTime = 0;
    tickingSound.play().catch(function(){});
  }
  function stopTicking() {
    tickingSound.pause();
    tickingSound.currentTime = 0;
  }
  function playSoldSound() {
    soldSound.currentTime = 0;
    soldSound.play().catch(function(){});
  }
  // ────────────────────────────────────────────────────────────────

  // Firebase 리스닝 콜백 등록 — onValue가 상태 변경 시 즉시 호출
  let firebaseConnected = false;

  window._onFirebaseState = function(stateObj) {
    firebaseConnected = true;  // Firebase 연결 확인
    if (isAnimating) return;
    updateUI(stateObj);
  };

  // Firebase 로드 실패 시에만 GAS 폴링으로 fallback
  setTimeout(function() {
    if (!firebaseConnected) {
      console.log('Firebase 연결 실패 — GAS 폴링으로 전환');
      setInterval(function() {
        if (isAnimating) return;
        google.script.run.withSuccessHandler(updateUI).getAuctionState();
      }, 1500);
    }
  }, 3000);

  function updateUI(stateObj) {
    if (!stateObj) return;

    // ✅ 시간 연장 감지 (상태는 같지만 endTime이 변경됨)
    if (stateObj.endTime && endTime && stateObj.endTime > endTime) {
      endTime = stateObj.endTime; // 전역 변수 업데이트 (타이머가 자동으로 반영)
    }

    // 상태가 바뀌지 않았으면 렌더링 스킵 (불필요한 DOM 갱신 방지)
    var nameEl = document.getElementById('current-item-name');
    if (stateObj.status === currentState && nameEl && nameEl.innerText === stateObj.itemName) return;

    // 낙찰 상태는 애니메이션으로 처리
    if (stateObj.status === 'sold' && currentState !== 'sold') {
      stopTimer();   // 타이머 정리
      stopTicking(); // 틱 소리 정지
      playSoldAnimation(stateObj);
      return;
    }

    // 상태 변경 시 타이머·틱 소리 정리
    if (stateObj.status !== currentState) {
      stopTimer();
      // idle / ended 로 전환되면 틱 소리도 끔
      if (stateObj.status === 'idle' || stateObj.status === 'ended') {
        stopTicking();
      }
    }

    currentState = stateObj.status;
    renderState(stateObj);
  }


  function renderState(stateObj) {
    var container = document.getElementById('mainContainer');

    // ── 대기 화면 ──────────────────────────────────────────────
    if (stateObj.status === 'idle') {
      container.innerHTML = '<div class="idle-text">다음 상품을 준비 중입니다... ⏳</div>';

    // ── 최초 경매 진행 중 ──────────────────────────────────────
    } else if (stateObj.status === 'bidding') {
      container.innerHTML =
        '<span id="current-item-name" style="display:none;">' + stateObj.itemName + '</span>' +
        '<div class="item-title">' + stateObj.itemName + '</div>' +
        '<div class="start-price">시작 입찰가: $ ' + Number(stateObj.startPrice).toLocaleString() + '</div>' +
        '<div class="bidding-text">🔥 자유롭게 호가를 외쳐주세요! 🔥</div>' +
        '<div id="timer" class="timer-display">30</div>';
      
      startTimer(stateObj.endTime);
      playTicking();

    // ── 1차 재경매 ─────────────────────────────────────────────
    } else if (stateObj.status === 'failed') {
      container.innerHTML =
        '<span id="current-item-name" style="display:none;">' + stateObj.itemName + '</span>' +
        '<div class="discount-badge">📉 ' + stateObj.failCount + '차 재경매 (입찰가 10% 하락!)</div>' +
        '<div class="item-title">' + stateObj.itemName + '</div>' +
        '<div class="start-price" style="border-color:#f39c12;color:#f39c12;background:rgba(243,156,18,0.1);">할인가: $ ' + Number(stateObj.currentPrice).toLocaleString() + '</div>' +
        '<div class="bidding-text" style="color:#bdc3c7;">지금이 기회입니다. 입찰하시겠습니까?</div>' +
        '<div id="timer" class="timer-display">30</div>';
      
      startTimer(stateObj.endTime);
      playTicking();

    // ── 최종 재경매 ────────────────────────────────────────────
    } else if (stateObj.status === 'failed_final') {
      container.innerHTML =
        '<span id="current-item-name" style="display:none;">' + stateObj.itemName + '</span>' +
        '<div class="discount-badge" style="background:#8e44ad;">⚠️ 최종 재경매 (누적 20% 하락!)</div>' +
        '<div class="item-title">' + stateObj.itemName + '</div>' +
        '<div class="start-price" style="border-color:#e74c3c;color:#e74c3c;background:rgba(231,76,60,0.1);">파격가: $ ' + Number(stateObj.currentPrice).toLocaleString() + '</div>' +
        '<div class="warning-box">' +
          '<div class="warning-text">🚨 경고 🚨</div>' +
          '<div style="font-size:30px;color:#fff;margin-top:10px;">' +
            '이번에도 유찰될 경우, 해당 권한이 없는 학생에게<br>' +
            '현재 가격으로 <span style="color:#f1c40f;">\'랜덤 강제 배정\'</span> 됩니다!' +
          '</div>' +
        '</div>' +
        '<div id="timer" class="timer-display" style="margin-top:20px;">30</div>';
      
      startTimer(stateObj.endTime);
      playTicking();

    // ── 경매 종료: 전체 학생 결과 ──────────────────────────────
    } else if (stateObj.status === 'ended') {
      var results  = stateObj.results || {};
      var students = Object.keys(results);

      students.sort(function(a, b) {
        var aHas = results[a].length > 0;
        var bHas = results[b].length > 0;
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        return a.localeCompare(b, 'ko');
      });

      var html = '<div class="results-header">🏁 오늘의 경매 종료 🏁</div>';
      html += '<div class="results-subtitle">모두 수고하셨습니다! 낙찰 결과를 확인하세요.</div>';

      if (students.length === 0) {
        html += '<div style="font-size:36px;color:#7f8c8d;padding:40px;">오늘 낙찰된 데이터가 없습니다.</div>';
      } else {
        html += '<div class="results-grid">';
        students.forEach(function(name) {
          var items   = results[name];
          var hasItem = items.length > 0;
          html += '<div class="result-card ' + (hasItem ? 'has-items' : 'no-items') + '">';
          html += '<div class="result-name">' + name + '</div>';
          if (hasItem) {
            html += '<div class="result-items">' +
              items.map(function(item) { return '• ' + item; }).join('<br>') +
            '</div>';
          } else {
            html += '<div class="no-item-text">낙찰 없음</div>';
          }
          html += '</div>';
        });
        html += '</div>';
      }
      container.innerHTML = html;
    }
  }

  // ── 낙찰 카운트다운 + 결과 애니메이션 ──────────────────────
  function playSoldAnimation(stateObj) {
    isAnimating = true;
    var container = document.getElementById('mainContainer');

    container.innerHTML = '<div class="countdown" style="animation:popIn 0.3s;">3</div>';
    setTimeout(function() { container.innerHTML = '<div class="countdown" style="animation:popIn 0.3s;">2</div>'; }, 1000);
    setTimeout(function() { container.innerHTML = '<div class="countdown" style="animation:popIn 0.3s;">1</div>'; }, 2000);

    setTimeout(function() {
      playSoldSound(); // ✅ 낙찰 완료 효과음
      container.innerHTML =
        '<div style="animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);">' +
          '<div class="sold-title">쾅! 낙찰 완료!</div>' +
          '<div style="font-size:50px;color:#bdc3c7;margin-bottom:20px;">' + stateObj.itemName + '</div>' +
          '<div class="sold-winner">🎉 낙찰자: ' + stateObj.winner + '</div>' +
          '<div class="sold-price">최종가: $ ' + Number(stateObj.finalPrice).toLocaleString() + '</div>' +
        '</div>';
      currentState = 'sold';
      isAnimating  = false;
    }, 3000);
  }

    // ✅ 타이머 기능 추가 ──────────────────────────────────────────
  function startTimer(targetEndTime) {
    // 기존 타이머 정리
    if (timerInterval) {
      clearInterval(timerInterval);
    }
    
    // ✅ endTime을 전역 변수에 저장 (시간 연장 시 업데이트됨)
    endTime = targetEndTime;
    
    timerInterval = setInterval(function() {
      var now = new Date().getTime();
      var remaining = Math.max(0, Math.ceil((endTime - now) / 1000));
      
      var timerEl = document.getElementById('timer');
      if (!timerEl) {
        clearInterval(timerInterval);
        return;
      }
      
      timerEl.textContent = remaining;
      
      // 10초 이하일 때 경고 애니메이션
      if (remaining <= 10) {
        timerEl.classList.add('warning');
      } else {
        timerEl.classList.remove('warning');
      }
      
      // 시간 종료
      if (remaining <= 0) {
        clearInterval(timerInterval);
        timerEl.textContent = '종료';
        stopTicking(); // 타이머 종료 시 틱 소리 정지
      }
    }, 100); // 0.1초마다 업데이트 (부드러운 카운트다운)
  }
  
  // 상태 변경 시 타이머 정리
  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }
  // ─────────────────────────────────────────────────────────────

</script>
</body>
</html>
